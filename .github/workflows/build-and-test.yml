name: Build and Test MAAP Jupyter Server Extension
on:
  push:
    branches:
      - main
      - develop
      - feature/major-refactor
  workflow_dispatch:
    inputs:
      test:
        description: "Test file or grep (default runs settings.spec.ts)"
        required: false
        default: "tests/settings.spec.ts"

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui-tests/package-lock.json

      - name: Install ui-tests dependencies
        working-directory: ui-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ui-tests
        run: npx playwright install --with-deps

      - name: Run Playwright (Galata) UI tests
        working-directory: ui-tests
        env:
          CI: "true"
        run: |
          npx playwright test "${{ inputs.test }}" --config playwright.config.js

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui-tests/playwright-report
          if-no-files-found: warn
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ui-tests/test-results
          if-no-files-found: warn
          retention-days: 14