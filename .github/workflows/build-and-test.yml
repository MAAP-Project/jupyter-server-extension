name: Build and Test MAAP Jupyter Server Extension

on:
  push:
    branches:
      - main
      - develop
      - feature/major-refactor
  workflow_dispatch:

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install JupyterLab
        run: |
          python -m pip install --upgrade pip
          python -m pip install "jupyterlab>=4,<5"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Enable Corepack (provides Yarn)
        run: corepack enable

      - name: Create `jlpm` shim (maps jlpm -> yarn)
        run: |
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/jlpm" <<'EOF'
          #!/usr/bin/env bash
          exec yarn "$@"
          EOF
          chmod +x "$HOME/.local/bin/jlpm"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install ui-tests dependencies
        working-directory: ui-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ui-tests
        run: npx playwright install --with-deps

      - name: Install MAAP Jupyter server extension
        run: |
            python -m pip install -e .

      - name: Enable MAAP Jupyter server extension
        run: |
            jupyter server extension list
            jupyter server extension enable --py maap_jupyter_server_extension || true
            jupyter server extension list

      - name: Run linting
        run: jlpm lint:ci

      - name: Run UI tests
        working-directory: ui-tests
        env:
          CI: "true"
        run: jlpm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui-tests/playwright-report
          if-no-files-found: warn
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ui-tests/test-results
          if-no-files-found: warn
          retention-days: 14